name: V40 Dual-Core Sovereign 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # إعادة تشغيل كل 4 ساعات لتجنب توقف خوادم جيت هوب

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Monster Dual-Core V40
      env:
        API_ID_1: ${{ secrets.API_ID_1 }}
        API_HASH_1: ${{ secrets.API_HASH_1 }}
        SESSION_1: ${{ secrets.SESSION_1 }}
        API_ID_2: ${{ secrets.API_ID_2 }}
        API_HASH_2: ${{ secrets.API_HASH_2 }}
        SESSION_2: ${{ secrets.SESSION_2 }}
        ADMIN_ID: ${{ secrets.ADMIN_ID }}
      run: python main.py
