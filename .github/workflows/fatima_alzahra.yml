name: فاطمة الزهراء (النسخة البشرية)
on:
  schedule: [{cron: '0 */5 * * *'}]
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: تثبيت Ollama ونموذج
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 10
          ollama pull llama3:8b
      - name: تثبيت المكتبات
        run: pip install -r requirements.txt
      - name: تشغيل فاطمة الزهراء
        env:
          API_ID_1: ${{ secrets.API_ID_1 }}
          API_HASH_1: ${{ secrets.API_HASH_1 }}
          SESSION_1: ${{ secrets.SESSION_1 }}
          API_ID_2: ${{ secrets.API_ID_2 }}
          API_HASH_2: ${{ secrets.API_HASH_2 }}
          SESSION_2: ${{ secrets.SESSION_2 }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          OLLAMA_MODEL: llama3:8b
        run: python fatima_alzahra.py
