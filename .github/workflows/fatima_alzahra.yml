name: Omega Continuous Sniper Loop

on:
  workflow_dispatch:
  repository_dispatch:
    types: [loop_trigger]

jobs:
  run-sniper:
    runs-on: ubuntu-latest

    steps:
    - name: جلب الكود الحالي
      uses: actions/checkout@v3

    - name: إعداد بيئة بايثون
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: تثبيت المكتبات الافتراضية للسرعة
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: تشغيل قناص أوميجا المطور
      env:
        API_ID_1: ${{ secrets.API_ID_1 }}
        API_HASH_1: ${{ secrets.API_HASH_1 }}
        SESSION_1: ${{ secrets.SESSION_1 }}
        API_ID_2: ${{ secrets.API_ID_2 }}
        API_HASH_2: ${{ secrets.API_HASH_2 }}
        SESSION_2: ${{ secrets.SESSION_2 }}
        ADMIN_ID: ${{ secrets.ADMIN_ID }}
      run: |
        python fatima_alzahra.py

    - name: إطلاق الدورة القادمة تلقائياً بدون توقف
      if: always()
      run: |
        echo "🚀 السكربت أغلق الدورة الحالية.. جاري إطلاق الدورة الجديدة فوراً عبر مفتاح GH_TOKEN..."
        curl -X POST -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
        -H "Accept: application/vnd.github.v3+json" \
        https://api.github.com/repos/${{ github.repository }}/actions/workflows/run.yml/dispatches \
        -d '{"ref":"main"}'


