name: Omega AI Collector - 24/7 Worker

on:
  schedule:
    # يعمل كل 6 ساعات (للتغلب على حد 6 ساعات)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # يسمح بالتشغيل اليدوي

jobs:
  run-omega:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 ساعات كحد أقصى

    steps:
      - name: 📥 تحميل المستودع
        uses: actions/checkout@v4

      - name: 🐍 إعداد بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 تثبيت المكتبات المطلوبة
        run: |
          pip install --upgrade pip
          pip install telethon openai cryptg

      - name: 🚀 تشغيل Omega AI Collector
        env:
          API_ID_1: ${{ secrets.API_ID_1 }}
          API_HASH_1: ${{ secrets.API_HASH_1 }}
          SESSION_1: ${{ secrets.SESSION_1 }}
          API_ID_2: ${{ secrets.API_ID_2 }}
          API_HASH_2: ${{ secrets.API_HASH_2 }}
          SESSION_2: ${{ secrets.SESSION_2 }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python omega_ai.py
